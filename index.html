<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture Workshops</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="data/modules.js"></script>
<style>
:root{--bg0:#060d1a;--bg1:#0d1829;--bg2:#131f33;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text0:#e8edf5;--text1:#9aa8bf;--text2:#5a6a85;--cyan:#22d3ee;--amber:#f59e0b;--green:#4ade80;--purple:#a78bfa;--font:'IBM Plex Mono','Courier New',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;--sidebar:230px;--detail:340px;}
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--text0);font-family:var(--font);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* TOP BAR */
header{height:46px;border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;background:var(--bg1);}
.hd-brand{padding:0 18px;font-size:11px;letter-spacing:.1em;color:var(--cyan);text-transform:uppercase;font-weight:600;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.hd-brand span{color:var(--text2);}
.hd-seg{display:flex;height:100%;border-right:1px solid var(--border);}
.seg-label{font-size:9px;letter-spacing:.1em;color:var(--text2);text-transform:uppercase;padding:0 10px 0 14px;display:flex;align-items:center;border-right:1px solid var(--border);}
.seg-btn{height:100%;padding:0 15px;background:none;border:none;border-right:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:11px;letter-spacing:.06em;cursor:pointer;transition:.15s;text-transform:uppercase;position:relative;}
.seg-btn:hover{color:var(--text0);}
.seg-btn.active{color:var(--cyan);}
.seg-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--cyan);}
.hd-views{display:flex;height:100%;margin-left:6px;}
.tab-btn{height:100%;padding:0 15px;background:none;border:none;border-right:1px solid var(--border);color:var(--text1);font-family:var(--font);font-size:11px;letter-spacing:.06em;cursor:pointer;transition:.15s;text-transform:uppercase;position:relative;}
.tab-btn:hover{color:var(--text0);}
.tab-btn.active{color:var(--cyan);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--cyan);}
.hd-right{margin-left:auto;padding:0 14px;display:flex;align-items:center;gap:7px;}
.preset-label{font-size:9px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;}
.preset-btn{padding:4px 9px;border:1px solid var(--border2);background:none;color:var(--text2);font-family:var(--font);font-size:10px;border-radius:3px;cursor:pointer;letter-spacing:.04em;transition:.15s;}
.preset-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.preset-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(245,158,11,.08);}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar-wrap{overflow:hidden;border-right:1px solid var(--border);transition:width .2s;flex-shrink:0;}
.sidebar-wrap.open{width:var(--sidebar);}
.sidebar-wrap.closed{width:0;border-right-width:0;}
.sidebar{width:var(--sidebar);overflow-y:auto;background:var(--bg1);height:100%;}
.main-wrap{flex:1;display:flex;overflow:hidden;position:relative;}
.sb-toggle{position:absolute;left:0;top:50%;transform:translateY(-50%);width:16px;height:34px;background:var(--bg1);border:1px solid var(--border2);border-left:none;border-radius:0 4px 4px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:10px;z-index:10;transition:.15s;}
.sb-toggle:hover{color:var(--cyan);border-color:var(--cyan);}
.dp-toggle{position:absolute;right:0;top:50%;transform:translateY(-50%);width:16px;height:34px;background:var(--bg1);border:1px solid var(--border2);border-right:none;border-radius:4px 0 0 4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:10px;z-index:10;transition:.15s;}
.dp-toggle:hover{color:var(--cyan);border-color:var(--cyan);}
.main{flex:1;overflow:hidden;}
.detail-panel{width:0;border-left:1px solid var(--border);overflow-y:auto;background:var(--bg1);flex-shrink:0;transition:width .2s;}
.detail-panel.open{width:var(--detail);}

/* SIDEBAR CONTENTS */
.sb-section{padding:12px 14px;border-bottom:1px solid var(--border);}
.sb-title{font-size:9px;letter-spacing:.12em;color:var(--text2);text-transform:uppercase;margin-bottom:9px;font-weight:600;}
.dim-row{margin-bottom:9px;}
.dim-label{display:flex;justify-content:space-between;margin-bottom:4px;}
.dim-name{font-size:11px;color:var(--text1);}
.dim-val{font-size:11px;color:var(--cyan);}
input[type=range]{width:100%;-webkit-appearance:none;height:2px;background:var(--border2);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--cyan);cursor:pointer;}
.color-by{display:flex;flex-direction:column;gap:3px;}
.color-opt{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:3px;cursor:pointer;font-size:11px;color:var(--text1);border:1px solid transparent;transition:.15s;}
.color-opt:hover{background:var(--bg2);}
.color-opt.active{border-color:var(--border2);color:var(--text0);background:var(--bg2);}
.color-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.layer-chips{display:flex;flex-direction:column;gap:3px;}
.layer-chip{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:3px;cursor:pointer;font-size:11px;color:var(--text1);border:1px solid transparent;transition:.15s;}
.layer-chip:hover{background:var(--bg2);}
.layer-chip.active{color:var(--text0);background:var(--bg2);border-color:var(--border);}
.layer-chip .ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ARCH VIEW */
#view-arch{height:100%;overflow:auto;padding:30px 36px;}
.logical-group{margin-bottom:38px;}
.logical-group-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.logical-group-name{font-size:17px;font-weight:500;font-family:var(--sans);}
.logical-group-count{font-size:10px;color:var(--text2);letter-spacing:.06em;}
.arch-section{margin-bottom:18px;}
.arch-layer-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.arch-layer-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.arch-layer-name{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
.arch-modules{display:flex;flex-wrap:wrap;gap:6px;}

/* MODULE CARD */
.mod-card{padding:9px 12px 8px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:border-color .15s,background .15s;min-width:130px;max-width:210px;background:var(--bg1);}
.mod-card:hover{border-color:var(--border2);background:var(--bg2);}
.mod-card.selected{border-color:var(--cyan) !important;}
.mod-card.dimmed{opacity:.15;pointer-events:none;}
.mod-card.dep-up{border-color:var(--amber) !important;}
.mod-card.dep-down{border-color:var(--green) !important;}
.mod-name{font-size:11px;font-weight:500;color:var(--text0);margin-bottom:8px;line-height:1.35;}
.roi-track{height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.roi-fill{height:100%;background:var(--cyan);border-radius:2px;}

/* DEP GRAPH */
#view-dep{height:100%;position:relative;}
#dep-svg{width:100%;height:100%;}
.dep-node{cursor:pointer;}
.dep-node text{font-family:var(--font);font-size:10px;fill:var(--text1);pointer-events:none;}
.dep-link{fill:none;stroke:rgba(255,255,255,.1);stroke-width:1px;}
.dep-link.hi-out{stroke:var(--amber);stroke-width:2px;}
.dep-link.hi-in{stroke:var(--green);stroke-width:2px;}
.dep-instructions{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;pointer-events:none;}

/* MATRIX */
#view-matrix{height:100%;overflow:hidden;}

/* DETAIL */
.dp-inner{padding:16px;min-width:var(--detail);}
.dp-close{float:right;background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--font);}
.dp-close:hover{color:var(--text0);}
.dp-layer-tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:4px;}
.dp-name{font-size:15px;font-weight:500;font-family:var(--sans);line-height:1.3;margin-bottom:2px;}
.dp-group{font-size:10px;color:var(--text2);margin-bottom:11px;}
.dp-desc{font-size:11px;color:var(--text1);line-height:1.7;font-family:var(--sans);margin-bottom:13px;}
.dp-sec-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;font-weight:600;margin-top:12px;}
.dp-text{font-size:11px;color:var(--text1);line-height:1.7;font-family:var(--sans);}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.score-name{font-size:10px;color:var(--text2);width:130px;flex-shrink:0;}
.score-track{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.score-fill{height:100%;border-radius:2px;}
.score-num{font-size:10px;color:var(--text1);min-width:12px;text-align:right;}
.dp-roi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.roi-card{background:var(--bg2);border-radius:4px;padding:9px 11px;}
.roi-val{font-size:20px;font-weight:600;color:var(--cyan);}
.roi-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.dep-list{display:flex;flex-direction:column;gap:3px;}
.dep-item{font-size:10px;padding:5px 8px;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;gap:6px;cursor:pointer;transition:.15s;}
.dep-item:hover{border-color:var(--border2);background:var(--bg2);}
.dep-item .di-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dep-item .di-dir{font-size:9px;color:var(--text2);margin-left:auto;}
.tag-mod{display:inline-block;font-size:9px;padding:2px 7px;border-radius:2px;background:rgba(245,158,11,.12);color:var(--amber);letter-spacing:.06em;font-weight:600;margin-bottom:9px;}
.dp-actions{display:flex;flex-direction:column;gap:5px;margin-top:14px;}
.dp-btn{padding:7px 11px;border:1px solid var(--border2);background:none;color:var(--text1);font-family:var(--font);font-size:10px;border-radius:3px;cursor:pointer;text-align:left;transition:.15s;}
.dp-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.s1{background:#f87171}.s2{background:#fb923c}.s3{background:#f59e0b}.s4{background:#4ade80}.s5{background:#22d3ee}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
</style>
</head>
<body>
<header>
  <div class="hd-brand">⬡ <span>Architecture</span> Workshop</div>
  <div class="hd-seg">
    <span class="seg-label">Group by</span>
    <button class="seg-btn active" data-group="logical">Logical</button>
    <button class="seg-btn" data-group="architectural">Architectural</button>
  </div>
  <div class="hd-views">
    <button class="tab-btn active" data-view="arch">Map</button>
    <button class="tab-btn" data-view="dep">Dependencies</button>
    <button class="tab-btn" data-view="matrix">Priority matrix</button>
  </div>
  <div class="hd-right">
    <span class="preset-label">Filter</span>
    <button class="preset-btn" data-preset="roi">Highest ROI</button>
    <button class="preset-btn" data-preset="aiwin">AI quick wins</button>
    <button class="preset-btn" data-preset="lowrisk">Low customer risk</button>
    <button class="preset-btn" data-preset="regulated">High regulation</button>
    <button class="preset-btn" data-preset="">Clear</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar-wrap open" id="sidebar-wrap">
    <div class="sidebar">
      <div class="sb-section">
        <div class="sb-title">Colour by</div>
        <div class="color-by" id="color-by"></div>
      </div>
      <div class="sb-section">
        <div class="sb-title">Min score filters</div>
        <div id="dim-filters"></div>
      </div>
      <div class="sb-section" id="layer-section">
        <div class="sb-title">Layers</div>
        <div class="layer-chips" id="layer-chips"></div>
      </div>
      <div class="sb-section">
        <div style="font-size:10px;color:var(--text2);line-height:1.8;">
          <span style="color:var(--cyan)">─</span> Bar length = ROI<br>
          <span style="color:var(--amber)">─</span> Amber border = upstream dep<br>
          <span style="color:var(--green)">─</span> Green border = downstream dep
        </div>
      </div>
    </div>
  </div>

  <div class="main-wrap">
    <div class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()">›</div>
    <main class="main">
      <div id="view-arch"></div>
      <div id="view-dep" style="display:none"></div>
      <div id="view-matrix" style="display:none"></div>
    </main>
    <div style="position:relative;display:flex;flex-shrink:0;">
      <div class="dp-toggle" id="dp-toggle" onclick="toggleDetail()" style="display:none">›</div>
      <div class="detail-panel" id="detail-panel">
        <div class="dp-inner" id="detail-inner"></div>
      </div>
    </div>
  </div>
</div>

<script>
const LOGICAL_GROUPS = [
  { id:'planning', label:'Flight Planning', color:'#8b5cf6', layers:['external','engine','modules','api'] },
  { id:'pilot',    label:'Pilot',           color:'#f97316', layers:['pilot'] },
  { id:'data',     label:'Data',            color:'#10b981', layers:['data','emerging'] },
];
const DIMS = [
  { id:'revenue_impact',  label:'Revenue impact',        color:'#22d3ee' },
  { id:'ai_sdlc',        label:'AI SDLC applicability',  color:'#a78bfa' },
  { id:'mod_complexity', label:'Mod complexity',         color:'#f87171' },
  { id:'incrementality', label:'Incrementality',         color:'#4ade80' },
  { id:'regulation',     label:'Regulation level',       color:'#f59e0b' },
  { id:'customer_impact',label:'Customer impact',        color:'#f472b6' },
];
const PRESETS = {
  roi:      { revenue_impact:4,ai_sdlc:1,mod_complexity:1,incrementality:4,regulation:1,customer_impact:1 },
  aiwin:    { revenue_impact:1,ai_sdlc:4,mod_complexity:1,incrementality:4,regulation:1,customer_impact:1 },
  lowrisk:  { revenue_impact:1,ai_sdlc:1,mod_complexity:1,incrementality:1,regulation:1,customer_impact:1 },
  regulated:{ revenue_impact:1,ai_sdlc:1,mod_complexity:1,incrementality:1,regulation:4,customer_impact:1 },
};
const MAX_ROI = 25;

let state = {
  view:'arch', groupMode:'logical', colorBy:'revenue_impact',
  filters:{ revenue_impact:1,ai_sdlc:1,mod_complexity:1,incrementality:1,regulation:1,customer_impact:1 },
  activeLayers: new Set(MODULES_DATA.layers.map(l=>l.id)),
  selectedId:null, sidebarOpen:true, detailOpen:true,
};

const getModById   = id => MODULES_DATA.modules.find(m=>m.id===id);
const getLayerById = id => MODULES_DATA.layers.find(l=>l.id===id);
const getLayerColor= id => getLayerById(id)?.color||'#6b7280';
const roiScore     = m  => (m.revenue_impact*m.incrementality)/m.mod_complexity;
const aiWinScore   = m  => (m.ai_sdlc*m.incrementality)/m.mod_complexity;
const scoreColor   = v  => ['','#f87171','#fb923c','#f59e0b','#4ade80','#22d3ee'][v]||'#6b7280';

function filteredModules() {
  return MODULES_DATA.modules.filter(m => {
    if (!state.activeLayers.has(m.layer)) return false;
    return DIMS.every(d => m[d.id] >= state.filters[d.id]);
  });
}
function getDepChain(id,seen=new Set()){if(seen.has(id))return seen;seen.add(id);getModById(id)?.depends_on.forEach(d=>getDepChain(d,seen));return seen;}
function getDownstream(id,seen=new Set()){if(seen.has(id))return seen;seen.add(id);MODULES_DATA.modules.forEach(m=>{if(m.depends_on.includes(id))getDownstream(m.id,seen);});return seen;}

function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  document.getElementById('sidebar-wrap').className='sidebar-wrap '+(state.sidebarOpen?'open':'closed');
  document.getElementById('sb-toggle').textContent = state.sidebarOpen?'‹':'›';
}

function buildSidebar() {
  const cb=document.getElementById('color-by');
  cb.innerHTML='';
  DIMS.forEach(d=>{
    const el=document.createElement('div');
    el.className='color-opt'+(state.colorBy===d.id?' active':'');
    el.innerHTML=`<span class="color-dot" style="background:${d.color}"></span>${d.label}`;
    el.onclick=()=>{state.colorBy=d.id;buildSidebar();renderCurrentView();};
    cb.appendChild(el);
  });
  const df=document.getElementById('dim-filters');
  df.innerHTML='';
  DIMS.forEach(d=>{
    const v=state.filters[d.id];
    df.innerHTML+=`<div class="dim-row"><div class="dim-label"><span class="dim-name">${d.label}</span><span class="dim-val" id="fv-${d.id}">${v}+</span></div><input type="range" min="1" max="5" value="${v}" oninput="state.filters['${d.id}']=+this.value;document.getElementById('fv-${d.id}').textContent=this.value+'+';renderCurrentView();"></div>`;
  });
  const ls=document.getElementById('layer-section');
  ls.style.display=state.groupMode==='architectural'?'':'none';
  const lc=document.getElementById('layer-chips');
  lc.innerHTML='';
  MODULES_DATA.layers.forEach(l=>{
    const on=state.activeLayers.has(l.id);
    const el=document.createElement('div');
    el.className='layer-chip'+(on?' active':'');
    el.innerHTML=`<span class="ldot" style="background:${l.color}"></span>${l.label}`;
    el.onclick=()=>{on?state.activeLayers.delete(l.id):state.activeLayers.add(l.id);buildSidebar();renderCurrentView();};
    lc.appendChild(el);
  });
}

function makeCard(m,filtSet,up,dn){
  const inF=filtSet.has(m.id),isSel=state.selectedId===m.id;
  const isUp=up&&up.has(m.id)&&m.id!==state.selectedId;
  const isDn=dn&&dn.has(m.id)&&m.id!==state.selectedId;
  const card=document.createElement('div');
  card.className='mod-card'+(isSel?' selected':'')+(!inF&&!isSel?' dimmed':'')+(isUp?' dep-up':'')+(isDn?' dep-down':'');
  const pct=(m[state.colorBy]/5)*100;
  const dim=DIMS.find(d=>d.id===state.colorBy);
  card.innerHTML=`<div class="mod-name">${m.name}</div><div class="roi-track"><div class="roi-fill" style="width:${pct}%;background:${dim?.color||'var(--cyan)'}"></div></div>`;
  card.onclick=()=>selectModule(m.id);
  return card;
}

function renderArch(){
  const c=document.getElementById('view-arch');
  c.innerHTML='';
  const filt=new Set(filteredModules().map(m=>m.id));
  const up=state.selectedId?getDepChain(state.selectedId):null;
  const dn=state.selectedId?getDownstream(state.selectedId):null;
  if(state.groupMode==='logical'){
    LOGICAL_GROUPS.forEach(g=>{
      const mods=MODULES_DATA.modules.filter(m=>g.layers.includes(m.layer));
      const sec=document.createElement('div');sec.className='logical-group';
      sec.innerHTML=`<div class="logical-group-hdr"><span class="logical-group-name" style="color:${g.color}">${g.label}</span><span class="logical-group-count">${mods.length} modules</span></div>`;
      const wrap=document.createElement('div');wrap.className='arch-modules';
      mods.forEach(m=>wrap.appendChild(makeCard(m,filt,up,dn)));
      sec.appendChild(wrap);c.appendChild(sec);
    });
  } else {
    MODULES_DATA.layers.forEach((layer,li)=>{
      if(!state.activeLayers.has(layer.id))return;
      const mods=MODULES_DATA.modules.filter(m=>m.layer===layer.id);
      const sec=document.createElement('div');sec.className='arch-section';
      sec.innerHTML=`<div class="arch-layer-hdr"><span class="arch-layer-dot" style="background:${layer.color}"></span><span class="arch-layer-name" style="color:${layer.color}">${layer.label}</span></div>`;
      const wrap=document.createElement('div');wrap.className='arch-modules';
      mods.forEach(m=>wrap.appendChild(makeCard(m,filt,up,dn)));
      sec.appendChild(wrap);c.appendChild(sec);
      if(li<MODULES_DATA.layers.length-1){const s=document.createElement('div');s.style.cssText='font-size:10px;color:var(--text2);margin:4px 0 4px 2px;';s.textContent='· · ·';c.appendChild(s);}
    });
  }
}

function renderDep(){
  const container=document.getElementById('view-dep');
  container.innerHTML='<svg id="dep-svg"></svg><div class="dep-instructions">Click a node to highlight its dependency chain</div>';
  const svg=d3.select('#dep-svg');
  const W=container.clientWidth,H=container.clientHeight;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  const filtIds=new Set(filteredModules().map(m=>m.id));
  const nodes=MODULES_DATA.modules.map(m=>({id:m.id,name:m.name,layer:m.layer,score:m[state.colorBy],filtered:filtIds.has(m.id)}));
  const links=[];
  MODULES_DATA.modules.forEach(m=>m.depends_on.forEach(dep=>{if(MODULES_DATA.modules.find(x=>x.id===dep))links.push({source:dep,target:m.id});}));
  const defs=svg.append('defs');
  [['arr','rgba(255,255,255,.15)'],['arr-out','rgba(245,158,11,.8)'],['arr-in','rgba(74,222,128,.8)']].forEach(([id,col])=>{
    defs.append('marker').attr('id',id).attr('viewBox','0 0 10 6').attr('refX',8).attr('refY',3).attr('markerWidth',6).attr('markerHeight',4).attr('orient','auto').append('path').attr('d','M0 0L10 3L0 6Z').attr('fill',col);
  });
  const link=svg.append('g').selectAll('line').data(links).enter().append('line').attr('class','dep-link').attr('marker-end','url(#arr)');
  const sim=d3.forceSimulation(nodes).force('link',d3.forceLink(links).id(d=>d.id).distance(85).strength(.6)).force('charge',d3.forceManyBody().strength(-200)).force('center',d3.forceCenter(W/2,H/2)).force('collision',d3.forceCollide(22));
  const node=svg.append('g').selectAll('g').data(nodes).enter().append('g').attr('class','dep-node')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on('click',(e,d)=>{selectModule(d.id);const up=getDepChain(d.id),dn=getDownstream(d.id);link.attr('class',l=>(up.has(l.source.id)&&up.has(l.target.id))?'dep-link hi-out':(dn.has(l.source.id)&&dn.has(l.target.id))?'dep-link hi-in':'dep-link').attr('marker-end',l=>(up.has(l.source.id)&&up.has(l.target.id))?'url(#arr-out)':dn.has(l.source.id)?'url(#arr-in)':'url(#arr)');e.stopPropagation();});
  node.append('circle').attr('r',d=>d.filtered?13:8).attr('fill',d=>d.filtered?scoreColor(d.score):'rgba(255,255,255,.04)').attr('stroke',d=>getLayerColor(d.layer)).attr('stroke-width',1.5).attr('opacity',d=>d.filtered?1:.3);
  node.append('text').attr('dy',22).attr('text-anchor','middle').attr('opacity',d=>d.filtered?1:.3).text(d=>d.name.length>16?d.name.slice(0,14)+'…':d.name);
  svg.on('click',()=>{selectModule(null);link.attr('class','dep-link').attr('marker-end','url(#arr)');});
  sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`);});
}

function renderMatrix(){
  const container=document.getElementById('view-matrix');
  container.innerHTML='<svg id="matrix-svg" width="100%" height="100%"></svg>';
  const svg=d3.select('#matrix-svg');
  const W=container.clientWidth,H=container.clientHeight;
  const M={top:40,right:50,bottom:50,left:60};
  const iW=W-M.left-M.right,iH=H-M.top-M.bottom;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  const xScale=d3.scaleLinear().domain([.8,5.2]).range([0,iW]);
  const yScale=d3.scaleLinear().domain([.8,5.2]).range([iH,0]);
  const rScale=d3.scaleSqrt().domain([1,5]).range([6,16]);
  const g=svg.append('g').attr('transform',`translate(${M.left},${M.top})`);
  const mx=xScale(3),my=yScale(3);
  [{x:0,y:0,w:mx,h:my,c:'rgba(74,222,128,.03)',l:'Low risk · low reward'},{x:mx,y:0,w:iW-mx,h:my,c:'rgba(34,211,238,.06)',l:'High ROI · focus here'},{x:0,y:my,w:mx,h:iH-my,c:'rgba(255,255,255,.01)',l:'Easy · low value'},{x:mx,y:my,w:iW-mx,h:iH-my,c:'rgba(248,113,113,.03)',l:'High value · hard'}].forEach(q=>{
    g.append('rect').attr('x',q.x).attr('y',q.y).attr('width',q.w).attr('height',q.h).attr('fill',q.c);
    g.append('text').attr('x',q.x+q.w/2).attr('y',q.y+q.h/2).attr('text-anchor','middle').style('font-size','9px').style('fill','var(--text2)').style('font-family','var(--font)').style('letter-spacing','.06em').text(q.l);
  });
  g.append('line').attr('x1',mx).attr('y1',0).attr('x2',mx).attr('y2',iH).attr('stroke','rgba(255,255,255,.07)').attr('stroke-dasharray','4 4');
  g.append('line').attr('x1',0).attr('y1',my).attr('x2',iW).attr('y2',my).attr('stroke','rgba(255,255,255,.07)').attr('stroke-dasharray','4 4');
  g.append('g').attr('transform',`translate(0,${iH})`).call(d3.axisBottom(xScale).ticks(5)).selectAll('text').style('fill','var(--text2)').style('font-family','var(--font)').style('font-size','10px');
  g.append('g').call(d3.axisLeft(yScale).ticks(5)).selectAll('text').style('fill','var(--text2)').style('font-family','var(--font)').style('font-size','10px');
  g.append('text').attr('x',iW/2).attr('y',iH+38).attr('text-anchor','middle').style('font-size','10px').style('fill','var(--text2)').style('font-family','var(--font)').text('← Simpler    Complexity    Harder →');
  g.append('text').attr('transform',`translate(-44,${iH/2}) rotate(-90)`).attr('text-anchor','middle').style('font-size','10px').style('fill','var(--text2)').style('font-family','var(--font)').text('Revenue impact');
  const filtSet=new Set(filteredModules().map(m=>m.id));
  MODULES_DATA.modules.filter(m=>state.activeLayers.has(m.layer)).forEach(m=>{
    const inf=filtSet.has(m.id);
    g.append('circle').attr('cx',xScale(m.mod_complexity)).attr('cy',yScale(m.revenue_impact)).attr('r',rScale(m[state.colorBy])).attr('fill',inf?scoreColor(m[state.colorBy]):'rgba(255,255,255,.04)').attr('stroke',getLayerColor(m.layer)).attr('stroke-width',state.selectedId===m.id?2:1).attr('opacity',inf?.75:.2).style('cursor','pointer').on('click',()=>selectModule(m.id)).append('title').text(`${m.name}\nROI: ${roiScore(m).toFixed(1)}`);
  });
}

function toggleDetail() {
  state.detailOpen = !state.detailOpen;
  const panel = document.getElementById('detail-panel');
  const btn   = document.getElementById('dp-toggle');
  panel.classList.toggle('open', state.detailOpen && !!state.selectedId);
  btn.textContent = state.detailOpen ? '›' : '‹';
}

function selectModule(id){
  // clicking the same element again → deselect everything
  if (id && id === state.selectedId) {
    state.selectedId = null;
    state.detailOpen = true;
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('dp-toggle').style.display = 'none';
    renderCurrentView();
    return;
  }
  state.selectedId = id;
  renderCurrentView();
  const panel  = document.getElementById('detail-panel');
  const toggle = document.getElementById('dp-toggle');
  const inner  = document.getElementById('detail-inner');
  if (!id) {
    panel.classList.remove('open');
    toggle.style.display = 'none';
    state.detailOpen = true;
    return;
  }
  // show toggle button always when something is selected
  toggle.style.display = 'flex';
  toggle.textContent = state.detailOpen ? '›' : '‹';
  panel.classList.toggle('open', state.detailOpen);
  const m=getModById(id);if(!m)return;
  const layer=getLayerById(m.layer);
  const logical=LOGICAL_GROUPS.find(g=>g.layers.includes(m.layer));
  const upMods=m.depends_on.map(getModById).filter(Boolean);
  const dnMods=MODULES_DATA.modules.filter(x=>x.depends_on.includes(m.id));
  inner.innerHTML=`
    <div class="dp-layer-tag" style="color:${layer.color}">${layer.label}</div>
    <div class="dp-name">${m.name}</div>
    <div class="dp-group" style="color:${logical?.color}">${logical?.label||''}</div>
    ${m.mod_opportunity?'<span class="tag-mod">✦ Modernisation opportunity</span>':''}
    <div class="dp-desc">${m.desc}</div>
    <div class="dp-roi-row">
      <div class="roi-card"><div class="roi-val">${roiScore(m).toFixed(1)}</div><div class="roi-label">ROI score</div></div>
      <div class="roi-card"><div class="roi-val" style="color:var(--purple)">${aiWinScore(m).toFixed(1)}</div><div class="roi-label">AI win score</div></div>
    </div>
    <div class="dp-sec-title">Scores</div>
    ${DIMS.map(d=>`<div class="score-row"><span class="score-name">${d.label}</span><div class="score-track"><div class="score-fill" style="width:${m[d.id]*20}%;background:${scoreColor(m[d.id])}"></div></div><span class="score-num">${m[d.id]}</span></div>`).join('')}
    <div class="dp-sec-title">Business value</div><div class="dp-text">${m.biz}</div>
    <div class="dp-sec-title">Technical detail</div><div class="dp-text">${m.tech}</div>
    <div class="dp-sec-title">Modernisation approach</div><div class="dp-text">${m.mod_approach}</div>
    <div class="dp-sec-title">AI SDLC assessment</div><div class="dp-text" style="color:${m.ai_sdlc>=4?'var(--cyan)':m.ai_sdlc<=2?'var(--text2)':'var(--text1)'}">${m.ai_sdlc_reasoning}</div>
    ${upMods.length?`<div class="dp-sec-title">Depends on</div><div class="dep-list">${upMods.map(d=>`<div class="dep-item" onclick="selectModule('${d.id}')"><span class="di-dot" style="background:${getLayerColor(d.layer)}"></span>${d.name}<span class="di-dir">↑</span></div>`).join('')}</div>`:''}
    ${dnMods.length?`<div class="dp-sec-title">Consumed by</div><div class="dep-list">${dnMods.map(d=>`<div class="dep-item" onclick="selectModule('${d.id}')"><span class="di-dot" style="background:${getLayerColor(d.layer)}"></span>${d.name}<span class="di-dir">↓</span></div>`).join('')}</div>`:''}
    <div class="dp-actions">
      <div style="font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;">Explore with AI</div>
      <button class="dp-btn" onclick="sendToChat('modernisation','${m.id}')">Modernisation deep dive ↗</button>
      <button class="dp-btn" onclick="sendToChat('dependencies','${m.id}')">Map dependencies ↗</button>
      <button class="dp-btn" onclick="sendToChat('aiplan','${m.id}')">AI SDLC plan ↗</button>
    </div>`;
}

function sendToChat(type,id){
  const m=getModById(id);
  const msgs={
    modernisation:`Create a detailed modernisation plan for "${m.name}". Include: phased delivery with small increments, team size, key risks, success metrics, timeline. Context: ${m.mod_approach}`,
    dependencies:`Analyse the dependency chain for "${m.name}". Which modules should be modernised first to unlock it? Recommended sequence?`,
    aiplan:`Write a concrete AI SDLC implementation plan for "${m.name}". Tools (Copilot, Claude, automated testing), workflow changes, expected speed gains, safe team introduction. Context: ${m.ai_sdlc_reasoning}`,
  };
  if(typeof sendPrompt==='function')sendPrompt(msgs[type]);
  else{navigator.clipboard?.writeText(msgs[type]);alert('Prompt copied to clipboard!');}
}

document.querySelectorAll('.preset-btn').forEach(btn=>{
  btn.onclick=()=>{
    const p=btn.dataset.preset;
    document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
    if(!p){DIMS.forEach(d=>state.filters[d.id]=1);}
    else{btn.classList.add('active');DIMS.forEach(d=>state.filters[d.id]=PRESETS[p][d.id]||1);}
    buildSidebar();renderCurrentView();
  };
});
document.querySelectorAll('.seg-btn').forEach(btn=>{
  btn.onclick=()=>{document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.groupMode=btn.dataset.group;buildSidebar();renderCurrentView();};
});
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.view=btn.dataset.view;document.querySelectorAll('[id^="view-"]').forEach(v=>v.style.display='none');document.getElementById('view-'+state.view).style.display='block';renderCurrentView();};
});

function renderCurrentView(){if(state.view==='arch')renderArch();else if(state.view==='dep')renderDep();else renderMatrix();}

buildSidebar();
renderArch();
</script>
